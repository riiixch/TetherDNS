version: '3.8'

services:
  cloudflare-ddns-manager:
    build: .
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/prisma/data
    environment:
      - DATABASE_URL=file:/app/prisma/data/cloudflare-ddns-manager.db
      - SESSION_PASSWORD=change_this_to_a_secure_long_random_string_for_production_use
      - NODE_ENV=production
